<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLT Analytics</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF;--ink:#0A0A0A;--grey:#6B6B6B;--faint:#9B9B9B;
    --line:#E4E4E4;--line-strong:#0A0A0A;--fill:#F5F5F5;
    --grotesk:'Archivo',Helvetica,Arial,sans-serif;--mono:'JetBrains Mono',ui-monospace,monospace;
    --maxw:1140px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--grotesk);background:var(--bg);color:var(--ink);line-height:1.5;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:64px 64px;}
  body::before{content:"";position:fixed;inset:0;background:var(--bg);opacity:.86;z-index:-1;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 clamp(20px,4vw,40px);}
  header{padding:20px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;}
  .brand{font-family:var(--mono);font-size:14px;font-weight:700;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);}
  main{padding:clamp(32px,6vw,56px) 0 64px;}
  h1{font-size:clamp(28px,4vw,40px);letter-spacing:-.03em;margin-top:10px;}
  .login{max-width:420px;margin:80px auto;text-align:left;}
  .login p{color:var(--grey);margin:12px 0 20px;font-size:15px;}
  input{font-family:var(--mono);font-size:14px;width:100%;padding:12px 14px;border:1px solid var(--line-strong);outline:none;}
  input:focus{border-color:var(--ink);}
  .btn{font-family:var(--mono);font-size:12.5px;padding:10px 18px;border:1px solid var(--line-strong);background:var(--ink);color:var(--bg);cursor:pointer;margin-top:12px;}
  .btn.ghost{background:transparent;color:var(--ink);}
  .err{font-family:var(--mono);font-size:12px;color:var(--ink);margin-top:10px;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-strong);border:1px solid var(--line-strong);margin-bottom:32px;}
  .stat{background:var(--bg);padding:18px;}
  .stat .k{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);}
  .stat .v{font-size:clamp(28px,4vw,36px);font-weight:700;letter-spacing:-.03em;margin-top:6px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:clamp(20px,4vw,32px);margin-bottom:32px;}
  .panel{border:1px solid var(--line-strong);}
  .panel-h{padding:14px 16px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--grey);}
  .panel-b{padding:0;}
  .row{display:grid;grid-template-columns:1fr auto;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line);font-size:14px;}
  .row:last-child{border-bottom:none;}
  .row .n{font-family:var(--mono);font-size:12px;color:var(--grey);}
  .chart{padding:16px;display:flex;align-items:flex-end;gap:6px;height:180px;border-bottom:1px solid var(--line);}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .bar{width:100%;max-width:28px;background:var(--ink);min-height:2px;transition:height .4s;}
  .bar-lbl{font-family:var(--mono);font-size:9px;color:var(--faint);writing-mode:vertical-rl;transform:rotate(180deg);max-height:48px;overflow:hidden;}
  .recent .row{grid-template-columns:140px 1fr 120px;}
  .recent .row span{font-family:var(--mono);font-size:11px;color:var(--grey);}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:24px;flex-wrap:wrap;}
  .toolbar .note{font-family:var(--mono);font-size:11px;color:var(--faint);}
  .hidden{display:none;}
  @media(max-width:860px){
    .stats{grid-template-columns:1fr 1fr;}
    .grid2{grid-template-columns:1fr;}
    .recent .row{grid-template-columns:1fr;gap:4px;}
  }
</style>
</head>
<body>

<div id="loginView" class="wrap login">
  <div class="eyebrow">// internal</div>
  <h1>Analytics dashboard</h1>
  <p>Enter your analytics token to view visitor stats.</p>
  <form id="loginForm">
    <input type="password" id="tokenInput" placeholder="ANALYTICS_TOKEN" autocomplete="current-password" required>
    <button type="submit" class="btn">Sign in</button>
  </form>
  <p class="err hidden" id="loginErr">Invalid token.</p>
</div>

<div id="dashView" class="hidden">
  <div class="wrap">
    <header>
      <div>
        <div class="eyebrow">// mlt site analytics</div>
        <div class="brand">Visitor dashboard</div>
      </div>
      <button class="btn ghost" id="logoutBtn" type="button">Sign out</button>
    </header>
  </div>
  <main class="wrap">
    <div class="toolbar">
      <button class="btn ghost" id="refreshBtn" type="button">Refresh</button>
      <span class="note" id="updatedAt"></span>
    </div>

    <div class="stats">
      <div class="stat"><div class="k">Total views</div><div class="v" id="totalViews">—</div></div>
      <div class="stat"><div class="k">Sessions</div><div class="v" id="totalSessions">—</div></div>
      <div class="stat"><div class="k">Views today</div><div class="v" id="viewsToday">—</div></div>
      <div class="stat"><div class="k">Sessions today</div><div class="v" id="sessionsToday">—</div></div>
    </div>

    <div class="panel" style="margin-bottom:32px;">
      <div class="panel-h">Views · last 30 days</div>
      <div class="chart" id="chart"></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <div class="panel-h">Traffic sources</div>
        <div class="panel-b" id="referrers"></div>
      </div>
      <div class="panel">
        <div class="panel-h">Top pages</div>
        <div class="panel-b" id="paths"></div>
      </div>
    </div>

    <div class="panel recent" style="margin-top:32px;">
      <div class="panel-h">Recent visits</div>
      <div class="panel-b" id="recent"></div>
    </div>
  </main>
</div>

<script>
(function(){
  var KEY = 'mlt_analytics_token';
  var loginView = document.getElementById('loginView');
  var dashView = document.getElementById('dashView');
  var loginForm = document.getElementById('loginForm');
  var loginErr = document.getElementById('loginErr');
  var tokenInput = document.getElementById('tokenInput');

  function token(){ return sessionStorage.getItem(KEY) || ''; }
  function setToken(t){ sessionStorage.setItem(KEY, t); }
  function clearToken(){ sessionStorage.removeItem(KEY); }

  function showDash(){
    loginView.classList.add('hidden');
    dashView.classList.remove('hidden');
    loadStats();
  }

  function showLogin(){
    dashView.classList.add('hidden');
    loginView.classList.remove('hidden');
  }

  function fmtTime(iso){
    var d = new Date(iso);
    return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
  }

  function renderList(el, items, labelKey){
    el.innerHTML = items.length ? items.map(function(item){
      return '<div class="row"><span>' + item[labelKey] + '</span><span class="n">' + item.count + '</span></div>';
    }).join('') : '<div class="row"><span>No data yet</span><span class="n">0</span></div>';
  }

  function loadStats(){
    fetch('/api/stats', { headers: { Authorization: 'Bearer ' + token() } })
      .then(function(r){
        if(r.status === 401) throw new Error('auth');
        return r.json();
      })
      .then(function(data){
        loginErr.classList.add('hidden');
        document.getElementById('totalViews').textContent = data.totalViews.toLocaleString();
        document.getElementById('totalSessions').textContent = data.totalSessions.toLocaleString();
        document.getElementById('viewsToday').textContent = data.viewsToday.toLocaleString();
        document.getElementById('sessionsToday').textContent = data.sessionsToday.toLocaleString();
        document.getElementById('updatedAt').textContent = 'Updated ' + new Date().toLocaleTimeString();

        var chart = document.getElementById('chart');
        var max = Math.max.apply(null, data.daySeries.map(function(d){ return d.views; }).concat([1]));
        chart.innerHTML = data.daySeries.map(function(d){
          var h = Math.round((d.views / max) * 100);
          var lbl = d.day.slice(5);
          return '<div class="bar-wrap" title="' + d.day + ': ' + d.views + ' views, ' + d.sessions + ' sessions">' +
            '<div class="bar" style="height:' + h + '%"></div>' +
            '<div class="bar-lbl">' + lbl + '</div></div>';
        }).join('') || '<div class="row" style="border:0;padding:16px;color:var(--grey);">No visits recorded yet.</div>';

        renderList(document.getElementById('referrers'), data.topReferrers, 'name');
        renderList(document.getElementById('paths'), data.topPaths, 'name');

        var recentEl = document.getElementById('recent');
        recentEl.innerHTML = data.recent.length ? data.recent.map(function(ev){
          return '<div class="row"><span>' + fmtTime(ev.ts) + '</span><span>' + ev.path + '</span><span>' + ev.referrerHost + '</span></div>';
        }).join('') : '<div class="row"><span>No visits yet</span></div>';
      })
      .catch(function(err){
        if(err.message === 'auth'){ clearToken(); showLogin(); loginErr.classList.remove('hidden'); }
      });
  }

  loginForm.addEventListener('submit', function(ev){
    ev.preventDefault();
    var t = tokenInput.value.trim();
    setToken(t);
    fetch('/api/stats', { headers: { Authorization: 'Bearer ' + t } })
      .then(function(r){ if(!r.ok) throw new Error('auth'); return r.json(); })
      .then(function(){ loginErr.classList.add('hidden'); showDash(); })
      .catch(function(){ clearToken(); loginErr.classList.remove('hidden'); });
  });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    clearToken();
    tokenInput.value = '';
    showLogin();
  });

  document.getElementById('refreshBtn').addEventListener('click', loadStats);

  if(token()){
    fetch('/api/stats', { headers: { Authorization: 'Bearer ' + token() } })
      .then(function(r){ if(!r.ok) throw new Error(); showDash(); })
      .catch(function(){ showLogin(); });
  }
})();
</script>
</body>
</html>
